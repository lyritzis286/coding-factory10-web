<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <div class="container-md border border-secondary-subtle border-1 mt-5">
        <div class="text-center display-6">Create Account</div>
        <div class="text-center mb-2 text-muted">Get started with your account</div>

        <div class="mb-2 text-center">
            <a  class="btn btn-primary btn-md col-xl-3 col-lg-4 col-md-5 col-sm-6" href="" role="button">
                <i class="bi bi-twitter-x"></i>
                Login via Twitter</a>
        </div>

        <div class="text-center">
            <a class="btn btn-primary btn-md col-xl-3 col-lg-4 col-md-5 col-sm-6" href="" role="button">
                <i class="bi bi-facebook"></i>
                Login via Facebook</a>
        
        </div>

        <div class="text-center mt-2">
        <p>OR</p>
        </div>

        <form >
          <div class="mx-auto mb-3 w-50 input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input class="form-control" type="text"  placeholder="username">
          </div>

          <div class="mx-auto mb-3 w-50 input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input class="form-control" type="password" placeholder="password">
          </div>

          <div class="text-center mb-3">
            <a class="btn btn-success btn-md" href="" role="button">Create Account</a>
          </div>
        </form>

        <div class="text-center  mb-3">
            <span>Have an account</span>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
