<div>

      </div>

</div>

<!-- MODAL -->
<div id="forgotModal">
  <div>
    <div>

      <div>
        <h5>Ανάκτηση Κωδικού</h5>
        <button data-bs-dismiss="modal"></button>
      </div>

      <div>
        <label>Email</label>
        <input type="email">
      </div>

      <div>
        <button data-bs-dismiss="modal">Κλείσιμο</button>
