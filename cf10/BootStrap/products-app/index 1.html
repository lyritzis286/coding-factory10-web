<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div>
    <a href="#">MyShop</a>
    <button data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span></span>
    </button>

    <div id="navMenu">
      <ul>
        <li><a href="index.html">Αρχική</a></li>
        <li><a href="login.html">Σύνδεση</a></li>
        <li><a href="products.html">Προϊόντα</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CAROUSEL -->
<div id="heroCarousel" data-bs-ride="carousel">
  <div>

    <div>
      <img src="https://picsum.photos/1200/400?1">
      <div>
        <h3>Καλώς Ήρθατε</h3>
        <p>Η καλύτερη εμπειρία αγορών</p>
      </div>
    </div>

    <div>
      <img src="https://picsum.photos/1200/400?2">
      <div>
        <h3>Νέα Προϊόντα</h3>
        <p>Δείτε τις νέες προσφορές</p>
      </div>
    </div>

  </div>

  <button data-bs-target="#heroCarousel" data-bs-slide="prev">
    <span></span>
  </button>

  <button data-bs-target="#heroCarousel" data-bs-slide="next">
    <span></span>
  </button>
</div>

<!-- COLLAPSE SECTION -->
<div>
  <h2>Πληροφορίες</h2>

  <p>
    <button data-bs-toggle="collapse" data-bs-target="#info">
      Περισσότερα
    </button>
  </p>

  <div id="info">
    <div>
      Εδώ μπορείτε να βρείτε πληροφορίες για το κατάστημα, τις υπηρεσίες και τις προσφορές μας.
    </div>
  </div>
</div>

<!-- TOOLTIP BUTTON -->
<div>
  <button data-bs-toggle="tooltip" data-bs-title="Αυτό είναι tooltip!">
    Hover me
  </button>
</div>

<script>
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el));
</script>

<!-- FOOTER -->
<footer>
  © 2026 MyShop — All rights reserved
</footer>

</body>
</html>
