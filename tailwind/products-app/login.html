<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Σύνδεση</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-300">

<nav class="bg-blue-700 text-white">
  <div class=" max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <!-- LOGO -->
    <a class="text-xl font-bold" href="index.html">MyShop</a>
    <!-- DESKTOP MENU -->
    <div class="hidden md:flex space-x-6">
      <a href="index.html" class="hover:text-yellow-300">Αρχική</a>
      <a href="login.html" class="hover:text-yellow-300">Σύνδεση</a>
      <a href="products.html" class="hover:text-yellow-300">Προϊόντα</a>
      
      <div class="group">
        <button>
          Άλλο
          <span><i class="fa-solid fa-angle-down"></i></span>
        </button>

        <div class=" absolute bg-white text-black rounded shadow-lg hidden group-hover:block w-40 z-50">
          <a class="block px-4 py-2 hover:bg-gray-200" href="#">Πληροφορίες</a>
          <a class="block px-4 py-2 hover:bg-gray-200" href="#">Επικοινωνία</a>
        </div>
      </div>
    </div>
      <!-- Mobile Hamburger -->
    <button id="menuBtn" class="md:hidden text-3xl">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
</svg>

      
    </button>
  </div>
    
  
  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="hidden md:hidden bg-blue-600 px-4 pb-4 space-y-2">
    <a class="block hover:text-yellow-300" href="index.html">Αρχική</a>
    <a class="block hover:text-yellow-300"  href="login.html">Σύνδεση</a>
    <a class="block hover:text-yellow-300"  href="products.html">Προϊόντα</a>
    
    <div>
      <button onclick="toggleMobileDropdown()">
        Άλλο
        <span>▼</span>
      </button>

      <div id="mobileDropdown" class="hidden ml-4 mt-2 space-y-1">
        <a class="block hover:text-yellow-300" href="#">Πληροφορίες</a>
        <a class="block hover:text-yellow-300" href="#">Επικοινωνία</a>
      </div>
    </div>
  </div>
</nav>

<div class="min-h-screen">
  <div class="bg-white mt-20 w-80 mx-auto p-8">

    <h2 class="text-center text-2xl font-bold mb-6 mt-4">Σύνδεση</h2>

    <form class="">
      <label class="block mb-2 ">Email</label>
      <input class="w-full border px-3 py-2 rounded mb-4" type="email">

      <label class="block mb-2">Κωδικός</label>
      <input class="w-full border px-3 py-2 rounded mb-4" type="password">

      <button class="w-full bg-blue-600 text-white py-2 rounded">Είσοδος</button>
    </form>

    <p class="text-center mt-4">
      <a class="text-blue-600" onclick="openModal()" href="#">Ξέχασα τον κωδικό</a>
    </p>

  </div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center ">
  <div class="bg-white p-6 rounded shadow-lg w-80">
    <h3 class="text-xl font-bold mb-4">Ανάκτηση Κωδικού</h3>

    <input class="w-full px-3 py-2 rounded mb-4 border" type="email" placeholder="Email">

    <div class="flex justify-end space-x-2">
      <button class="px-4 py-2 bg-gray-300 rounded" onclick="closeModal()">Κλείσιμο</button>
      <button class="px-4 py-2 bg-blue-600 text-white rounded">Αποστολή</button>
    </div>
  </div>
</div>
<footer class="bg-gray-800 text-white text-center py-4 mt-10">
  © 2026 MyShop — All rights reserved
</footer>

<script>
  function openModal() {
    document.getElementById("modal").classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById("modal").classList.add('hidden');
  }
</script>
</body>
</html>
